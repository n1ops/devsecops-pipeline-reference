name: DevSecOps Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  actions: read

env:
  IMAGE_NAME: devsecops-task-api
  AWS_REGION: us-east-1
  ECS_CLUSTER: devsecops-task-api-cluster
  ECS_SERVICE: devsecops-task-api-service

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Secret Detection
  # ──────────────────────────────────────────────
  secret-detection:
    name: "Stage 1: Secret Detection (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # Stage 2: Static Application Security Testing
  # ──────────────────────────────────────────────
  sast:
    name: "Stage 2: SAST (Bandit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install 'bandit[sarif]==1.8.3'

      - name: Run Bandit
        run: bandit -r app/ -c .bandit.yml -f sarif -o bandit-results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
        if: always()
        continue-on-error: true
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  # ──────────────────────────────────────────────
  # Stage 3: Software Composition Analysis
  # ──────────────────────────────────────────────
  sca:
    name: "Stage 3: SCA (pip-audit)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt -f json -o pip-audit-results.json

      - name: Upload pip-audit results
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-results.json

  # ──────────────────────────────────────────────
  # Stage 4: Infrastructure as Code Scanning
  # ──────────────────────────────────────────────
  iac-scan:
    name: "Stage 4: IaC Scan (Checkov)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: pip install 'checkov==3.2.0'

      - name: Run Checkov
        run: checkov -d terraform/ -o sarif --output-file-path . --skip-check CKV_AWS_2,CKV_AWS_158

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
        if: always()
        continue-on-error: true
        with:
          sarif_file: results_cli.sarif
          category: checkov

  # ──────────────────────────────────────────────
  # Stage 5: Unit Tests
  # ──────────────────────────────────────────────
  unit-tests:
    name: "Stage 5: Unit Tests (pytest)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────
  # Stage 6: Container Scanning
  # ──────────────────────────────────────────────
  container-scan:
    name: "Stage 6: Container Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # v0.34.1
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          trivyignores: ".trivyignore"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ──────────────────────────────────────────────
  # Stage 7: SBOM Generation
  # ──────────────────────────────────────────────
  sbom:
    name: "Stage 7: SBOM Generation (Syft)"
    runs-on: ubuntu-latest
    needs: container-scan
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@28d71544de8eaf1b958d335707167c5f783590ad # v0.22.2
        with:
          image: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: spdx-json
          output-file: sbom-spdx.json

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@28d71544de8eaf1b958d335707167c5f783590ad # v0.22.2
        with:
          image: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: cyclonedx-json
          output-file: sbom-cyclonedx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: sbom-reports
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json

  # ──────────────────────────────────────────────
  # Stage 8: Dynamic Application Security Testing
  # ──────────────────────────────────────────────
  dast:
    name: "Stage 8: DAST (OWASP ZAP)"
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies and start app
        run: |
          pip install -r requirements.txt
          SECRET_KEY=dast-testing-secret-$(openssl rand -hex 16) DEBUG=true \
            uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers &
          sleep 5

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: "http://localhost:8000"
          rules_file_name: ""
          allow_issue_writing: false
          cmd_options: "-a -j"

  # ──────────────────────────────────────────────
  # Stage 9: Security Gate
  # ──────────────────────────────────────────────
  security-gate:
    name: "Stage 9: Security Gate"
    runs-on: ubuntu-latest
    needs:
      - secret-detection
      - sast
      - sca
      - iac-scan
      - unit-tests
      - container-scan
      - sbom
      - dast
    if: always()
    steps:
      - name: Check pipeline results
        run: |
          echo "========================================="
          echo "   DevSecOps Security Gate Summary"
          echo "========================================="
          echo ""
          echo "Stage 1 - Secret Detection: ${{ needs.secret-detection.result }}"
          echo "Stage 2 - SAST (Bandit):    ${{ needs.sast.result }}"
          echo "Stage 3 - SCA (pip-audit):  ${{ needs.sca.result }}"
          echo "Stage 4 - IaC (Checkov):    ${{ needs.iac-scan.result }}"
          echo "Stage 5 - Unit Tests:       ${{ needs.unit-tests.result }}"
          echo "Stage 6 - Container Scan:   ${{ needs.container-scan.result }}"
          echo "Stage 7 - SBOM Generation:  ${{ needs.sbom.result }}"
          echo "Stage 8 - DAST (ZAP):       ${{ needs.dast.result }}"
          echo ""

          # Gate logic: fail on CRITICAL stages
          CRITICAL_FAILURES=0

          if [ "${{ needs.secret-detection.result }}" == "failure" ]; then
            echo "CRITICAL: Secret detection found issues!"
            CRITICAL_FAILURES=$((CRITICAL_FAILURES + 1))
          fi

          if [ "${{ needs.unit-tests.result }}" == "failure" ]; then
            echo "CRITICAL: Unit tests failed!"
            CRITICAL_FAILURES=$((CRITICAL_FAILURES + 1))
          fi

          if [ "${{ needs.container-scan.result }}" == "failure" ]; then
            echo "CRITICAL: Container scan found vulnerabilities!"
            CRITICAL_FAILURES=$((CRITICAL_FAILURES + 1))
          fi

          if [ "${{ needs.sca.result }}" == "failure" ]; then
            echo "CRITICAL: SCA found vulnerable dependencies!"
            CRITICAL_FAILURES=$((CRITICAL_FAILURES + 1))
          fi

          if [ $CRITICAL_FAILURES -gt 0 ]; then
            echo ""
            echo "GATE RESULT: FAILED ($CRITICAL_FAILURES critical failure(s))"
            exit 1
          else
            echo "GATE RESULT: PASSED (non-critical findings are tracked in Security tab)"
            echo ""
            echo "Stage 10 (Deploy) runs after gate passes — push to main only."
          fi

  # ──────────────────────────────────────────────
  # Stage 10: Deploy to ECS
  # ──────────────────────────────────────────────
  deploy:
    name: "Stage 10: Deploy to ECS"
    runs-on: ubuntu-latest
    needs: security-gate
    permissions:
      contents: read
      id-token: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.security-gate.result == 'success'
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG

      - name: Register new ECS task definition revision
        id: task-def
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Fetch current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $IMAGE_NAME \
            --query 'taskDefinition' \
            --output json)

          # Update image in container definition and strip read-only fields
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          # Register new revision
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task-definition-arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition ${{ steps.task-def.outputs.task-definition-arn }} \
            --force-new-deployment

      - name: Wait for deployment stability
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE
