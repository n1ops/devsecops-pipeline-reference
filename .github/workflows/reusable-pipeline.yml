# ============================================================================
# Reusable DevSecOps Pipeline
# ============================================================================
# Called by other repos with a ~20-line caller workflow. See TOMORROW-PLAN.md.
#
# Example caller:
#   jobs:
#     security:
#       uses: n1ops/devsecops-pipeline-reference/.github/workflows/reusable-pipeline.yml@main
#       with:
#         language: python
#         runtime-version: "3.11"
#         install-command: "pip install -r requirements-dev.txt"
#         test-command: "pytest tests/ -v --tb=short"
#         sast-command: "pip install 'bandit[sarif]' && bandit -r app/ -f sarif -o bandit-results.sarif"
#         sca-command: "pip install pip-audit && pip-audit -r requirements.txt"
#         terraform-directory: "terraform/"
#         image-name: "my-app"
#         app-start-command: "SECRET_KEY=test DEBUG=true uvicorn app.main:app --host 0.0.0.0 --port 8000 &"
#         app-port: "8000"
#       secrets: inherit
# ============================================================================

name: Reusable DevSecOps Pipeline

on:
  workflow_call:
    inputs:
      language:
        description: "Language for CodeQL and runtime setup (python, javascript, go, java)"
        type: string
        required: true

      runtime-version:
        description: "Runtime version — '3.11' for Python, '20' for Node.js, '1.22' for Go"
        type: string
        default: "3.11"

      install-command:
        description: "Command to install project dependencies (used by test and DAST stages)"
        type: string
        default: "pip install -r requirements-dev.txt"

      test-command:
        description: "Command to run the test suite"
        type: string
        default: "pytest tests/ -v --tb=short"

      sast-command:
        description: "SAST command including tool install (empty = skip SAST)"
        type: string
        default: ""

      sca-command:
        description: "SCA command including tool install (empty = skip SCA)"
        type: string
        default: ""

      terraform-directory:
        description: "Path to Terraform files (empty = skip IaC scanning)"
        type: string
        default: ""

      image-name:
        description: "Docker image name (empty = skip container build/scan/SBOM/deploy)"
        type: string
        default: ""

      app-start-command:
        description: "Command to start app for DAST — include '&' to background (empty = skip DAST)"
        type: string
        default: ""

      app-port:
        description: "Port the app listens on (used by DAST to target http://localhost:<port>)"
        type: string
        default: "8000"

    secrets:
      AWS_ROLE_ARN:
        required: false

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Secret Detection (always runs)
  # ──────────────────────────────────────────────
  secret-detection:
    name: "Stage 1: Secret Detection (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # Stage 2: Static Application Security Testing
  # ──────────────────────────────────────────────
  sast:
    name: "Stage 2: SAST"
    runs-on: ubuntu-latest
    if: ${{ inputs.sast-command != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.runtime-version }}

      - name: Set up Node.js
        if: ${{ inputs.language == 'javascript' || inputs.language == 'typescript' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.runtime-version }}

      - name: Run SAST
        continue-on-error: true
        run: ${{ inputs.sast-command }}

  # ──────────────────────────────────────────────
  # Stage 2b: CodeQL Analysis (always runs)
  # ──────────────────────────────────────────────
  codeql:
    name: "Stage 2b: CodeQL Analysis"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
        with:
          languages: ${{ inputs.language }}
          queries: +security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
        continue-on-error: true
        with:
          category: codeql
          upload: never
          output: ../results

      - name: Upload CodeQL SARIF
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
        continue-on-error: true
        if: always()
        with:
          sarif_file: ../results
          category: codeql

  # ──────────────────────────────────────────────
  # Stage 3: Software Composition Analysis
  # ──────────────────────────────────────────────
  sca:
    name: "Stage 3: SCA"
    runs-on: ubuntu-latest
    if: ${{ inputs.sca-command != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.runtime-version }}

      - name: Set up Node.js
        if: ${{ inputs.language == 'javascript' || inputs.language == 'typescript' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.runtime-version }}

      - name: Run SCA
        run: ${{ inputs.sca-command }}

  # ──────────────────────────────────────────────
  # Stage 4: Infrastructure as Code Scanning
  # ──────────────────────────────────────────────
  iac-scan:
    name: "Stage 4: IaC Scan (Checkov)"
    runs-on: ubuntu-latest
    if: ${{ inputs.terraform-directory != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: pip install 'checkov==3.2.0'

      - name: Run Checkov
        continue-on-error: true
        run: checkov -d ${{ inputs.terraform-directory }} -o sarif --output-file-path . -s

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
        if: always()
        continue-on-error: true
        with:
          sarif_file: results_sarif.sarif
          category: checkov

  # ──────────────────────────────────────────────
  # Stage 5: Unit Tests (always runs)
  # ──────────────────────────────────────────────
  unit-tests:
    name: "Stage 5: Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.runtime-version }}

      - name: Set up Node.js
        if: ${{ inputs.language == 'javascript' || inputs.language == 'typescript' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.runtime-version }}

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Run tests
        run: ${{ inputs.test-command }}

  # ──────────────────────────────────────────────
  # Stage 6: Container Scanning
  # ──────────────────────────────────────────────
  container-scan:
    name: "Stage 6: Container Scan (Trivy)"
    runs-on: ubuntu-latest
    if: ${{ inputs.image-name != '' }}
    needs: unit-tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build Docker image
        run: docker build -t ${{ inputs.image-name }}:${{ github.sha }} .

      - name: Save Docker image as tarball
        run: docker save ${{ inputs.image-name }}:${{ github.sha }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # v0.34.1
        with:
          image-ref: "${{ inputs.image-name }}:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e # v4.32.4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ──────────────────────────────────────────────
  # Stage 7: SBOM Generation
  # ──────────────────────────────────────────────
  sbom:
    name: "Stage 7: SBOM Generation (Syft)"
    runs-on: ubuntu-latest
    if: ${{ inputs.image-name != '' }}
    needs: container-scan
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download image artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@28d71544de8eaf1b958d335707167c5f783590ad # v0.22.2
        with:
          image: "${{ inputs.image-name }}:${{ github.sha }}"
          format: spdx-json
          output-file: sbom-spdx.json

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@28d71544de8eaf1b958d335707167c5f783590ad # v0.22.2
        with:
          image: "${{ inputs.image-name }}:${{ github.sha }}"
          format: cyclonedx-json
          output-file: sbom-cyclonedx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom-reports
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json

  # ──────────────────────────────────────────────
  # Stage 8: Dynamic Application Security Testing
  # ──────────────────────────────────────────────
  dast:
    name: "Stage 8: DAST (OWASP ZAP)"
    runs-on: ubuntu-latest
    if: ${{ inputs.app-start-command != '' }}
    needs: unit-tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.runtime-version }}

      - name: Set up Node.js
        if: ${{ inputs.language == 'javascript' || inputs.language == 'typescript' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.runtime-version }}

      - name: Install dependencies and start app
        run: |
          ${{ inputs.install-command }}
          ${{ inputs.app-start-command }}
          sleep 5

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: "http://localhost:${{ inputs.app-port }}"
          rules_file_name: ""
          allow_issue_writing: false
          cmd_options: "-a -j"

  # ──────────────────────────────────────────────
  # Stage 9: Security Gate
  # ──────────────────────────────────────────────
  security-gate:
    name: "Stage 9: Security Gate"
    runs-on: ubuntu-latest
    needs:
      - secret-detection
      - sast
      - codeql
      - sca
      - iac-scan
      - unit-tests
      - container-scan
      - sbom
      - dast
    if: always()
    steps:
      - name: Evaluate pipeline results
        run: |
          echo "========================================="
          echo "   DevSecOps Security Gate Summary"
          echo "========================================="
          echo ""
          echo "Stage 1 - Secret Detection: ${{ needs.secret-detection.result }}"
          echo "Stage 2 - SAST:             ${{ needs.sast.result }}"
          echo "Stage 2b - CodeQL:          ${{ needs.codeql.result }}"
          echo "Stage 3 - SCA:              ${{ needs.sca.result }}"
          echo "Stage 4 - IaC (Checkov):    ${{ needs.iac-scan.result }}"
          echo "Stage 5 - Unit Tests:       ${{ needs.unit-tests.result }}"
          echo "Stage 6 - Container Scan:   ${{ needs.container-scan.result }}"
          echo "Stage 7 - SBOM Generation:  ${{ needs.sbom.result }}"
          echo "Stage 8 - DAST (ZAP):       ${{ needs.dast.result }}"
          echo ""

          # Gate logic: fail on CRITICAL stages only
          # Skipped stages (empty inputs) are treated as passing
          CRITICAL_FAILURES=0

          if [ "${{ needs.secret-detection.result }}" == "failure" ]; then
            echo "CRITICAL: Secret detection found issues!"
            CRITICAL_FAILURES=$((CRITICAL_FAILURES + 1))
          fi

          if [ "${{ needs.unit-tests.result }}" == "failure" ]; then
            echo "CRITICAL: Unit tests failed!"
            CRITICAL_FAILURES=$((CRITICAL_FAILURES + 1))
          fi

          if [ "${{ needs.container-scan.result }}" == "failure" ]; then
            echo "CRITICAL: Container scan found vulnerabilities!"
            CRITICAL_FAILURES=$((CRITICAL_FAILURES + 1))
          fi

          if [ "${{ needs.sca.result }}" == "failure" ]; then
            echo "CRITICAL: SCA found vulnerable dependencies!"
            CRITICAL_FAILURES=$((CRITICAL_FAILURES + 1))
          fi

          if [ $CRITICAL_FAILURES -gt 0 ]; then
            echo ""
            echo "GATE RESULT: FAILED ($CRITICAL_FAILURES critical failure(s))"
            exit 1
          else
            echo ""
            echo "GATE RESULT: PASSED"
            echo "Non-critical findings are tracked in the Security tab."
          fi

  # ──────────────────────────────────────────────
  # Stage 10: Deploy to ECS
  # ──────────────────────────────────────────────
  deploy:
    name: "Stage 10: Deploy to ECS"
    runs-on: ubuntu-latest
    needs: security-gate
    permissions:
      contents: read
      id-token: write
    if: >-
      inputs.image-name != '' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.security-gate.result == 'success'
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      IMAGE_NAME: ${{ inputs.image-name }}
      AWS_REGION: us-east-1
      ECS_CLUSTER: ${{ inputs.image-name }}-cluster
      ECS_SERVICE: ${{ inputs.image-name }}-service
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      - name: Download image artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: docker-image

      - name: Load, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker load -i image.tar
          docker tag $IMAGE_NAME:$IMAGE_TAG $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
          docker push $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG

      - name: Register new ECS task definition revision
        id: task-def
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $IMAGE_NAME \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task-definition-arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition ${{ steps.task-def.outputs.task-definition-arn }} \
            --force-new-deployment

      - name: Wait for deployment stability
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE
